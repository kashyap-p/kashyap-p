name: Generate Snake Animation

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate snake.svg
        uses: Platane/snk@v3
        with:
          github_user_name: kashyap-p
          outputs: |
            github-contribution-grid-snake.svg?palette=github-light
            github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit & push generated files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add github-contribution-grid-snake.svg github-contribution-grid-snake-dark.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update contribution snake animation"
          git push
